<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>F1 Reverse Grid Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>F1 Reverse Grid Generator</h1>

<section class="card">
    <h2>Fahrer hinzufügen</h2>

    <select id="teamSelect"></select>

    <input id="driverName" placeholder="Fahrername">

    <input id="stintsInput" placeholder="Stints (z.B. 1,2,3)">

    <button id="addDriverBtn">Fahrer Hinzufügen</button>
</section>

<section class="card">
    <h2>Fahrerübersicht</h2>
    <div id="driverOverview"></div>
</section>

<section class="card">
    <h2>Rennergebnis</h2>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Stint</th>
                <th>Startplatz</th>
                <th>Team</th>
                <th>Fahrer</th>
                <th>Platzierung</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>

    <button id="calculateBtn">
        Reverse Grid berechnen
    </button>
</section>

<section class="card">
    <h2>Nächstes Rennen</h2>

    <table id="nextGridTable">
        <thead>
            <tr>
                <th>Startplatz nächstes Rennen</th>
                <th>Team</th>
                <th>Fahrer</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>
</section>

<script src="script.js"></script>

</body>
</html>
